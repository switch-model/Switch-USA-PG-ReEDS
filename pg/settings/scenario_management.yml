# This is a nested dictionary of settings changes for each scenario defined in the
# "scenario_definitions_fn" file.
# - The fist set of keys are planning years or "all_years".
# - The second set of keys are either "all_cases" or the name of a scenario in the
# "scenario_definitions_fn" file. If "all_cases" then the settings key: value will be
# applied to all settings files for that year. An example scenario might be "ccs_capex".
# - The third set of keys are names of scenario values. For a "ccs_capex" scenario these
# might be "high", "mid", "low".
# - The values under this third set of keys are a key: value pair where the key is a
# parameter from this settings file with a value that should be modified for a specific
# case.
settings_management:
  all_years:
    time_series:
      p1:
        reduce_time_domain: false
        # no need to add extreme day when there's only one time sample
        model_adjustment_scripts:
          Add extreme day: ~
      s1x1:
        time_domain_periods: 1
        time_domain_days_per_period: 1
      s4x1:
        time_domain_periods: 4
        time_domain_days_per_period: 1
      s20x1:
        time_domain_periods: 20
        time_domain_days_per_period: 1
      s40x1:
        time_domain_periods: 40
        time_domain_days_per_period: 1
      s2555x1:
        # all possible weather days, individually
        time_domain_periods: 2555
        time_domain_days_per_period: 1
      s4x5:
        time_domain_periods: 4
        time_domain_days_per_period: 5
      s10x5:
        time_domain_periods: 10
        time_domain_days_per_period: 5
    load_growth:
      icf:
        # add the load growth and mark it as shiftable; but shifting
        # will be constrained separately by load_growth_flexibility
        flexible_demand_resources:
          2024:
            load_growth:
              fraction_shiftable: 1.0
              parameter_values:
                # add dummy value that will be overridden by PG to avoid
                # warnings from PG about empty parameter_values
                New_Build: -1
          2029:
            load_growth:
              fraction_shiftable: 1.0
              parameter_values:
                New_Build: -1
          2030:
            load_growth:
              fraction_shiftable: 1.0
              parameter_values:
                New_Build: -1
          2035:
            load_growth:
              fraction_shiftable: 1.0
              parameter_values:
                New_Build: -1
      low:
        demand_response: lower_growth
        # settings below are same as icf
        # add the load growth and mark it as shiftable; but shifting
        # will be constrained separately by load_growth_flexibility
        flexible_demand_resources:
          2024:
            load_growth:
              fraction_shiftable: 1.0
              parameter_values:
                # add dummy value that will be overridden by PG to avoid
                # warnings from PG about empty parameter_values
                New_Build: -1
          2029:
            load_growth:
              fraction_shiftable: 1.0
              parameter_values:
                New_Build: -1
          2030:
            load_growth:
              fraction_shiftable: 1.0
              parameter_values:
                New_Build: -1
          2035:
            load_growth:
              fraction_shiftable: 1.0
              parameter_values:
                New_Build: -1
      none: ~

    load_growth_flexibility:
      none: ~ # no effect, useful for historical cases
      firm: ~ # use default settings from flexible_load.yml
      flex_001:
        # allow 0.001 availability for demand response virtual generator
        model_tag_values:
          gen_max_annual_availability:
            load_growth: 0.001
    allow_retirement:
      yes: ~ # allowed for thermal plants after 2024 by default
      no:
        # disable retirement for all plants in all years
        model_tag_values:
          Can_Retire:
            "": 0
    resource_limits:
      none: ~ # default
      high_gas:
        # currently unused, see define_scenarios.py instead
        model_tag_values:
          MaxCapTag_Ban:
            # tech names used for new-build non-gas techs, but not existing/planned
            UtilityPV: 1
            OffShoreWind: 1
            LandbasedWind: 1
            Nuclear_Nuclear: 1
            Battery Storage: 1
      low_gas:
        # currently unused, see define_scenarios.py instead
        model_tag_values:
          MaxCapTag_Ban:
            # technology name for new gas, but not existing/planned
            NaturalGas: 1
    policies:
      current: ~ # use default settings
      decarb:
        # national carbon tax at 200, to see what would be cheapest way to decarbonize
        emission_policies_fn: emission_policies_decarb.csv
        carbon_cost_dollar_per_tco2: 200
    make_split_models:
      yes:
        model_adjustment_scripts:
          # drop some scripts by setting to ~:
          Increase timepoint duration to 2 hours: ~ # keep 1-hour resolution
          Add extreme days: ~
          # add this adjustment script:
          Make resource adequacy models:
            script: ../../adjust/make_split_models.py
            # identify capacity expansion scenarios to use as the basis for the RA model (--reuse-build-scenarios)
            # and define arguments to every one-day scenario to do the following:
            #   - reduce output
            #   - relax environmental policies
            #   - use unserved load instead of PRM, to avoid infeasibility and find most difficult time
            arguments: >-
              --reuse-build-scenarios switch/in/2030/ce/scenarios_build.txt
              --include-module study_modules.reduce_reporting
              --skip-generic-output --skip-output-files dispatch.csv
              dispatch_wide.csv dispatch_gen_annual_summary.csv
              dispatch_zonal_annual_summary.csv dispatch_annual_summary_fuel.pdf
              dispatch_annual_summary_tech.pdf --exclude-modules
              study_modules.min_capacity_constraint
              study_modules.max_capacity_constraint study_modules.rps_regional
              --include-module study_modules.report_zonal_total_dispatch
              --exclude-module study_modules.scheduled_outages --exclude-module
              study_modules.planning_reserves_extreme_days --include-module
              study_modules.unserved_load --solver coptampl
              --solver-options-string "lpmethod=2 crossover=0"
            # run last because it copies everything created by other scripts into
            # split subdirectories
            order: 20
      no: ~ # default settings
    add_extreme_days:
      yes: ~ # default settings
      no:
        model_adjustment_scripts:
          Add extreme days: ~ # bypass script
    fuel_price_forecast:
      aeo2025:
        # get coal and gas from AEO 2025 reference
        eia_series_fuel_names:
          coal: STC
          naturalgas: NG
          distillate: DFO
          uranium: U
        aeo_fuel_scenarios:
          coal: reference
          naturalgas: reference
          distillate: reference
          uranium: reference
      hist5:
        # managed by make_hist5_fuel_price_forecast.py
        user_fuel_usd_year:
          coal: 2025
          distillate: 2025
          naturalgas: 2025
          uranium: 2025
