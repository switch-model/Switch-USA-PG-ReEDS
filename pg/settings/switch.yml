# generator (resource) columns to pass through to gen_info.csv for Switch
gen_info_extra_columns:
  # gen_info column: PowerGenome resource column
  gen_max_annual_availability: gen_max_annual_availability
  gen_can_provide_spinning_reserves: gen_can_provide_spinning_reserves

# financial terms (should be real, i.e., net of inflation)
# TODO: take the average of various technologies from PowerGenome / NREL ATB
# 6.4% real (9.6% nominal) cost of capital is based on Lazard 2025 assumptions
# of 60% debt at 8% and 40% equity at 12% and 3% inflation in 2024-25.
# 5% real (8.3% nominal) is close to the NREL ATB average across techs
# (https://atb.nrel.gov/electricity/2024/financial_cases_&_methods#:~:text=LCOE%20by%20technology%20and%20financial%20assumptions%20case)
interest_rate: 0.05
discount_rate: 0.03

# can be all_timepoints or peak_load (timeseries with highest coincident load)
# TODO: check if GenX has a native version of this
prr_enforcement_timescale: peak_load

# script(s) to run after setting up a model directory will be called with the
# path to the directory plus any additional arguments in the `arguments` key.
# Path to script should be specified relative to the PowerGenome settings
# directory.
model_adjustment_scripts:
  # description of script:  # can set to ~ for a scenario to bypass this script
  #   script: ../../path/to/script.py
  #   arguments: (optional) --additional_arguments "to pass" --to 'script'
  #   order: 3  # order to run script in (optional, default 5)
  Add spinning reserve info:
    script: ../../adjust/add_spinning_reserve_info.py
    order: 1
  Relax local TD capacity:
    script: ../../adjust/relax_local_td.py
    order: 2
  Add demand response info:
    script: ../../adjust/add_dr_info.py
    # run before add_extreme_days to index off normal peak load, not super-peak
    order: 2
  Add energy efficiency info:
    script: ../../adjust/add_ee_info.py
    # run before add_extreme_days to index off normal peak load, not super-peak
    order: 2
  Add ITC data:
    # creates itc.csv with data from `itc` key below
    script: ../../adjust/add_itc_data.py
    order: 2
  Convert to going-forward costs:
    # apply new-build generator costs to EIA planned gens in 2026 or later
    # and zero out transmission costs (gives simpler estimate of "going-forward"
    # generation costs and also enables application of ITC to EIA planned gens)
    script: ../../adjust/make_going_forward_costs.py
    # updates gen_build_costs.csv and trans_params.csv; should be pretty independent of other scripts
    order: 3
  Increase timepoint duration to 2 hours:
    script: ../../adjust/increase_timepoint_duration.py
    # run before add_extreme_days; alters some files used by that script
    order: 8
  Add extreme days:
    script: ../../adjust/add_extreme_days.py
    # run late, because it may create a new directory copied from the main one
    # (but that behavior is incompatible with make_split_models.py)
    order: 10
  Define scenarios:
    script: ../../adjust/define_scenarios.py
    # run after add_extreme_days; will look for both regular and _prm versions
    # of model directory (if present) and create different files in them
    order: 11

# price to pay to go beyond carbon caps in emission_policies_fn (which may be
# zero for a simple tax). Note: pg_to_switch.py is currently setup to use the
# same price for all carbon programs
# TODO: see which flags GenX used to implement this in MIP and use those
# $33.43 is based on the average of California ($35.21) and
# Washington (31.64) in 2024
# https://icapcarbonaction.com/en/ets/usa-california-cap-and-trade-program
# https://icapcarbonaction.com/en/ets/usa-washington-cap-and-invest-program
# also see  for which policies apply
carbon_cost_dollar_per_tco2: 33.43

# solar: 175 MW based on midpoint of 216-240 GW(dc), converted to AC with 1.3
# ILR.
# https://www.woodmac.com/news/opinion/the-state-of-safe-harbouring-a-strategic-outlook-for-us-utility-scale-solar-development/
# Crux (below) estimate 145 GW for solar, but Wood Mac seems more authoritative.
# wind: we assume all currently planned wind in EIA 860m as of March 2026 (23167
# MW winter capacity) is safe-harbored; this aligns with Crux estimate of 23 GW.
# https://www.cruxclimate.com/insights/developers-and-manufacturer-takeaways-from-2025-market-intelligence-report
itc:
  # energy source, start year, end year, ITC rate, eligible MW (or omit for infinite)
  - [sun, 2026, 2030, 0.3, 175000]
  - [wind, 2026, 2030, 0.3, 23167]
